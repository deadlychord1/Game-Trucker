<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Игровой трекер | Продвинутый дизайн</title>
<!-- Шрифты и иконки для красоты -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
<style>
body {
  margin: 0;
  font-family: 'Roboto', sans-serif;
  background: linear-gradient(135deg, #1f1c2c, #928dab);
  color: #fff;
  overflow-x: hidden;
}

/* header */
h1 {
  text-align: center;
  padding: 20px;
  font-size: 2.5rem;
}

/* menu */
.menu {
  display: flex;
  justify-content: center;
  gap: 14px;
  margin-bottom: 20px;
}

/* кнопки */
button {
  background-color: #ff6f61;
  border: none;
  border-radius: 8px;
  padding: 10px 20px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.3s, transform 0.2s;
}
button:hover {
  background-color: #ff3b2e;
  transform: translateY(-2px);
}

/* стили для контента */
#content {
  max-width: 1000px;
  margin: 0 auto 40px auto;
  padding: 0 20px;
}

/* карточки игр */
#games {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
}
.game {
  background: rgba(255, 255, 255, 0.1);
  border-radius: 12px;
  overflow: hidden;
  padding: 15px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  transition: transform 0.2s, box-shadow 0.2s;
}
.game:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}
.game img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 8px;
  margin-bottom: 10px;
}

/* отзывы и админка */
#adminPanel {
  background-color: rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 20px;
  margin-top: 30px;
}
.section-title {
  font-size: 1.5rem;
  margin-top: 20px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}
#gameListAdmin, #reviewsModeration {
  max-height: 250px;
  overflow-y: auto;
  padding: 10px;
  background: rgba(255,255,255,0.05);
  border-radius: 8px;
}
#gameListAdmin div, #reviewsModeration div {
  margin-bottom: 10px;
}
/* формы */
#addGameForm, #editGameForm {
  background-color: rgba(255,255,255,0.15);
  border-radius: 12px;
  padding: 15px;
  margin-top: 15px;
}
#addGameForm input[type=text], #addGameForm input[type=number], #editGameForm input[type=text], #editGameForm input[type=number] {
  width: calc(50% - 10px);
  margin: 10px 10px 10px 0;
  padding: 8px;
  border: none;
  border-radius: 6px;
  font-family: 'Roboto', sans-serif;
}
#addGameForm label, #editGameForm label {
  display: block;
  margin-top: 10px;
}
#saveGameBtn {
  background-color: #4CAF50;
  margin-top: 15px;
  width: 100%;
}
#saveEditedBtn {
  background-color: #2196F3;
  margin-top: 15px;
  width: 48%;
}
#cancelEditBtn {
  background-color: #f44336;
  margin-top: 15px;
  width: 48%;
}
</style>
</head>
<body>

<h1>🎮 Мой расширенный игровой трекер</h1>

<div class="menu">
  <button onclick="showAuth()">Войти / Регистрация</button>
</div>

<!-- Варианты авторизации -->
<div id="authButtons">
  <button onclick="showLoginForm()">Вход</button>
  <button onclick="showRegisterForm()">Регистрация</button>
</div>

<!-- Формы входа и регистрации -->
<div id="authFormContainer" style="display:none; margin-top:20px;">
  <div id="loginForm" style="display:none;">
    <h3>Войти</h3>
    <input type="email" id="loginEmail" placeholder="Email" />
    <input type="password" id="loginPassword" placeholder="Пароль" />
    <button onclick="performLogin()">Войти</button>
  </div>
  <div id="registerForm" style="display:none;">
    <h3>Регистрация</h3>
    <input type="text" id="registerNick" placeholder="Ник" />
    <input type="email" id="registerEmail" placeholder="Email" />
    <input type="password" id="registerPassword" placeholder="Пароль" />
    <button onclick="performRegister()">Зарегистрироваться</button>
  </div>
  <button onclick="hideAuth()">Отмена</button>
</div>

<!-- Модальное окно для входа по модулю -->
<div id="modalOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:999;">
  <div style="background:#222; padding:20px; border-radius:10px; max-width:300px; width:90%;">
    <h4>Введите свои данные</h4>
    <input type="email" id="modalEmail" placeholder="Email" />
    <input type="password" id="modalPassword" placeholder="Пароль" />
    <br>
    <button onclick="modalLogin()">Войти</button>
    <button onclick="closeModal()">Отмена</button>
  </div>
</div>

<!-- Основной контент -->
<div id="content" style="display:none;">
  <div id="userPanel">
    <p>Вы вошли как: <b id="userEmail"></b></p>
    <button onclick="logout()">Выйти</button>
  </div>

  <!-- Админка --> 
  <div id="adminPanel" style="display:none; background: rgba(255,255,255,0.1); border-radius:12px; padding:20px; margin-top:20px;">
    <h3 style="margin-bottom:15px;">👑 Админка</h3>
    <button onclick="showAddGame()">Добавить/Редактировать игру</button>
    <button onclick="loadAdminTools()">Обновить список</button>
    <div id="addGameForm" style="display:none; margin-top:15px;">
      <h4>Удалить/Редактировать игру</h4>
      <div id="gameListAdmin"></div>
      <h4>Добавить новую игру</h4>
      <input type="text" id="newGameName" placeholder="Название" />
      <input type="number" id="newGameRating" placeholder="Рейтинг" min="1" max="10" />
      <select id="newGameStatus">
        <option>Пройдено</option>
        <option>В процессе</option>
        <option>В планах</option>
      </select>
      <input type="file" id="newGameImage" accept="image/*" />
      <button onclick="saveGame()">Сохранить новую игру</button>
      
      <!-- Для редактирования -->
      <form id="editGameForm" style="display:none; margin-top:20px; background:#333; padding:15px; border-radius:8px;">
        <input type="hidden" id="editGameId" />
        <input type="text" id="editGameName" placeholder="Название" />
        <input type="number" id="editGameRating" placeholder="Рейтинг" min="1" max="10" />
        <select id="editGameStatusSelect">
          <option>Пройдено</option>
          <option>В процессе</option>
          <option>В планах</option>
        </select>
        <input type="file" id="editGameImage" accept="image/*" />
        <button type="button" id="saveEditedBtn" onclick="saveEditedGame()">Обновить игру</button>
        <button type="button" id="cancelEditBtn" onclick="hideEditForm()">Отмена</button>
      </form>
    </div>
    <h4>Модерация отзывов</h4>
    <div id="reviewsModeration"></div>
  </div>

  <h3>Все игры</h3>
  <div id="games"></div>

  <!-- Оставить отзыв -->
  <div style="margin-top:30px;">
    <h4>Оставить отзыв</h4>
    <select id="reviewGame"></select>
    <input type="number" id="reviewRating" placeholder="Оценка 1-10" min="1" max="10" />
    <select id="reviewBack">
      <option value="yes">Вернусь</option>
      <option value="no">Не вернусь</option>
      <option value="maybe">Возможно</option>
    </select>
    <button onclick="submitReview()">Отправить</button>
  </div>
</div>

<!-- Скрипты -->
<script>
  // Инициализация Firebase
  const firebaseConfig = { /* ваши данные */ };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
  const storage = firebase.storage();
  const ADMIN_EMAIL = "werker196@gmail.com";

  let isAdmin = false;

  // --- Обработчики интерфейса ---
  function showAuth() {
    document.getElementById('authButtons').innerHTML='';
    document.getElementById('authFormContainer').style.display='block';
    document.getElementById('content').style.display='none';
    showLoginForm();
  }
  function hideAuth() {
    document.getElementById('authButtons').innerHTML= '<button onclick="showAuth()">Войти / Регистрация</button>';
    document.getElementById('authFormContainer').style.display='none';
  }
  function showLoginForm() {
    document.getElementById('loginForm').style.display='block';
    document.getElementById('registerForm').style.display='none';
  }
  function showRegisterForm() {
    document.getElementById('loginForm').style.display='none';
    document.getElementById('registerForm').style.display='block';
  }
  async function performLogin() {
    try {
      await auth.signInWithEmailAndPassword(
        document.getElementById('loginEmail').value.trim(),
        document.getElementById('loginPassword').value.trim()
      );
      hideAuth();
    } catch(e) { alert('Ошибка: ' + e.message); }
  }
  async function performRegister() {
    try {
      const userCred = await auth.createUserWithEmailAndPassword(
        document.getElementById('registerEmail').value.trim(),
        document.getElementById('registerPassword').value.trim()
      );
      await userCred.user.updateProfile({ displayName: document.getElementById('registerNick').value.trim() });
      localStorage.setItem('siteUser', JSON.stringify({email: userCred.user.email, nick: document.getElementById('registerNick').value.trim() }));
      alert('Регистрация прошла успешно! Войдите.');
      hideAuth();
    } catch(e){ alert('Ошибка: ' + e.message); }
  }
  function showModal() {
    document.getElementById('modalOverlay').style.display='flex';
  }
  function closeModal() {
    document.getElementById('modalOverlay').style.display='none';
  }
  async function modalLogin() {
    try {
      await auth.signInWithEmailAndPassword(
        document.getElementById('modalEmail').value.trim(),
        document.getElementById('modalPassword').value.trim()
      );
      closeModal();
    } catch(e) { alert('Ошибка: ' + e.message); }
  }

  async function logout() {
    await auth.signOut();
    isAdmin=false;
  }

  // --- Обработчик аутентификации ---
  auth.onAuthStateChanged(user => {
    if (user) {
      localStorage.setItem('siteUser', JSON.stringify({email: user.email, nick: user.displayName || user.email}));
      if (user.email===ADMIN_EMAIL) {
        isAdmin=true;
        loginAsAdmin();
      } else {
        isAdmin=false;
        loginAsUser(user.displayName || user.email);
      }
    } else {
      localStorage.removeItem('siteUser');
      showAuth();
      document.getElementById('adminPanel').style.display='none';
    }
    loadData();
  });

  function loginAsUser(nick) {
    document.getElementById('content').style.display='block';
    document.getElementById('userEmail').innerHTML='Вы вошли как: <b>' + (nick || 'пользователь') + '</b>';
    document.getElementById('adminPanel').style.display='none';
  }

  function loginAsAdmin() {
    document.getElementById('content').style.display='block';
    document.getElementById('userEmail').innerHTML='Вы вошли как <b>Админ</b>';
    document.getElementById('adminPanel').style.display='block';
    loadAdminTools();
    loadGames();
  }

  async function loadData() {
    await loadGames();
    if (isAdmin) loadAdminTools();
  }

  // Загрузка игр
  async function loadGames() {
    const snap = await db.collection('games').get();
    const gameSelect = document.getElementById('reviewGame');
    gameSelect.innerHTML='<option value="">Выберите игру</option>';

    document.getElementById('games').innerHTML='';
    snap.forEach(doc => {
      const g = {...doc.data(), id: doc.id};
      let img=g.imageUrl?`<img src="{g.imageUrl}"/>`:'';
      document.getElementById('games').innerHTML+=
        `<div class="game">${img}<h4>${g.name}</h4><p>⭐${g.rating}/10, ${g.status}</p></div>`;
      // добавляем в селектор отзывов
      gameSelect.innerHTML+=`<option value="${g.id}">${g.name}</option>`;
    });
  }

  // Админские функции
  async function loadAdminTools() {
    const user = await auth.currentUser;
    if (!user || user.email !== ADMIN_EMAIL) return;
    // Модерация отзывов
    const snap = await db.collection('reviews').where('status','==','pending').get();
    const revDiv=document.getElementById('reviewsModeration');
    revDiv.innerHTML='';
    if (snap.empty) {
      revDiv.innerHTML='Нет отзывов на модерации.';
    } else {
      snap.forEach(r => {
        const d=r.data();
        revDiv.innerHTML+=`<div>📝 ${d.userNick}: <b>${d.rate}</b>/10 (${d.back})</div>
        <button onclick="approveRev('${r.id}')">✓ Одобрить</button>
        <button onclick="rejectRev('${r.id}')">✗ Удалить</button><hr>`;
      });
    }

    // Список игр для редактирования и удаления
    const docs=await db.collection('games').get();
    const gameListDiv=document.getElementById('gameListAdmin');
    gameListDiv.innerHTML='';
    docs.forEach(g => {
      const data=g.data();
      gameListDiv.innerHTML+=`<div style="display:flex; justify-content:space-between; align-items:center;">
        <span>${data.name}</span>
        <div>
          <button onclick="editGame('${g.id}')">Редактировать</button>
          <button onclick="deleteGame('${g.id}')">Удалить</button>
        </div>
      </div>`;
    });
  }

  async function approveRev(id) {
    await db.collection('reviews').doc(id).update({status:'approved'});
    loadAdminTools();
  }
  async function rejectRev(id) {
    await db.collection('reviews').doc(id).delete();
    loadAdminTools();
  }

  async function deleteGame(id) {
    if (confirm('Удалить игру?')) {
      await db.collection('games').doc(id).delete();
      const revs=await db.collection('reviews').where('gameId','==',id).get();
      for (const r of revs.docs) await db.collection('reviews').doc(r.id).delete();
      loadGames();
      loadAdminTools();
    }
  }

  // Добавить новую игру
  async function saveGame() {
    const name=document.getElementById('newGameName').value.trim();
    const rating=parseInt(document.getElementById('newGameRating').value);
    const status=document.getElementById('newGameStatus').value;
    const file=document.getElementById('newGameImage').files[0];
    if (!name || !rating) { alert('Заполните все поля!'); return; }
    let imageUrl='';
    if (file) {
      const ref=storage.ref().child('game_images/'+Date.now()+'.jpg');
      await ref.put(file);
      imageUrl=await ref.getDownloadURL();
    }
    await db.collection('games').add({name, rating, status, imageUrl});
    document.getElementById('newGameName').value='';
    document.getElementById('newGameRating').value='';
    loadGames();
    loadAdminTools();
    document.getElementById('addGameForm').style.display='none';
  }

  // Редактирование
  async function editGame(id) {
    const g=await db.collection('games').doc(id).get();
    const data=g.data();
    document.getElementById('editGameId').value=id;
    document.getElementById('editGameName').value=data.name;
    document.getElementById('editGameRating').value=data.rating;
    document.getElementById('editGameStatusSelect').value=data.status;
    document.getElementById('editGameForm').style.display='block';
    gameToEditId=id;
  }

  function showAddGame() {
    document.getElementById('editGameForm').style.display='block';
    document.getElementById('editGameId').value='';
    document.getElementById('editGameName').value='';
    document.getElementById('editGameRating').value='';
    document.getElementById('editGameStatusSelect').value='Пройдено';
  }

  function hideEditForm() {
    document.getElementById('editGameForm').style.display='none';
  }

  async function saveEditedGame() {
    const id=document.getElementById('editGameId').value;
    const name=document.getElementById('editGameName').value.trim();
    const rating=parseInt(document.getElementById('editGameRating').value);
    const status=document.getElementById('editGameStatusSelect').value;
    const file=document.getElementById('editGameImage').files[0];

    if(!name || !rating) { alert('Заполните все поля!'); return; }

    const updateData={name,rating,status};
    if (file) {
      const ref=storage.ref().child('game_images/'+Date.now()+'.jpg');
      await ref.put(file);
      updateData.imageUrl=await ref.getDownloadURL();
    }

    await db.collection('games').doc(id).update(updateData);
    hideEditForm();
    loadGames();
    loadAdminTools();
  }

  // Отзыв
  async function submitReview() {
    const gameId=document.getElementById('reviewGame').value;
    const rate=document.getElementById('reviewRating').value;
    const back=document.getElementById('reviewBack').value;
    const user=JSON.parse(localStorage.getItem('siteUser'));
    if (!gameId || !rate || !user) { alert('Заполните всё!'); return; }
    await db.collection('reviews').add({
      gameId, rate, back, userNick: user.nick || user.email, status:'pending', created:new Date()
    });
    alert('Отзыв отправлен на модерацию!');
    document.getElementById('reviewRating').value='';
    document.getElementById('reviewGame').value='';
  }

  // Показываем форму редактирования игры
  function showEditGame(id) {
    editGame(id);
  }

  // Показываем форму для добавления/редактирования
  function showAddGame() {
    document.getElementById('editGameForm').style.display='block';
    document.getElementById('editGameId').value='';
    document.getElementById('editGameName').value='';
    document.getElementById('editGameRating').value='';
    document.getElementById('editGameStatusSelect').value='Пройдено';
  }
  function hideEditForm() {
    document.getElementById('editGameForm').style.display='none';
  }
</script>
</body>
</html>
