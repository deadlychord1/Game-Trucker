<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админ‑Панель</title>
    <style>
        body {font-family:sans-serif;background:#e2e8f0;padding:30px;}
        .box {background:#fff;padding:20px;border-radius:10px;margin-bottom:20px;
               box-shadow:0 2px 10px rgba(0,0,0,.1);}
        .review-item {border-bottom:1px solid #ccc;padding:10px 0;
                      display:flex;justify-content:space-between;}
        .btn {padding:5px 15px;border:none;cursor:pointer;border-radius:4px;}
        .btn-add {background:#22c55e;color:#fff;}
        .btn-del {background:#ef4444;color:#fff;}
        input,select{padding:8px;margin-right:10px;border:1px solid #cbd5e1;
                     border-radius:4px;}
        .login-overlay{
            position:fixed;top:0;left:0;width:100%;height:100%;
            background:rgba(0,0,0,.6);display:flex;align-items:center;
            justify-content:center;z-index:1000;
        }
        .login-box{
            background:#fff;padding:30px;border-radius:12px;
            box-shadow:0 4px 20px rgba(0,0,0,.3);
            text-align:center;
        }
    </style>
</head>
<body>
<h1>👑 Моё управление</h1>

<!-- ==== Окно ввода пароля ==== -->
<div id="loginOverlay" class="login-overlay">
    <div class="login-box">
        <h3>Вход в админ‑панель</h3>
        <input type="password" id="adminPassInput" placeholder="Введите пароль"
               style="width:200px;">
        <br><br>
        <button class="btn btn-add" onclick="checkPassword()">Войти</button>
    </div>
</div>

<!-- ==== Основной контент (скрыт до ввода пароля) ==== -->
<div id="adminContent" style="display:none;">
    <div class="box">
        <h3>Добавить новую игру</h3>
        <input type="text" id="gName" placeholder="Название игры">
        <input type="number" id="gRate" placeholder="Оценка (1‑10)" max="10">
        <select id="gStatus">
            <option value="Пройдено">Пройдено</option>
            <option value="В процессе">В процессе</option>
            <option value="В планах">В планах</option>
        </select>
        <button class="btn btn-add" onclick="addGame()">Добавить</button>
    </div>

    <div class="box">
        <h3>Ожидают проверки (Отзывы пользователей)</h3>
        <div id="pendingList"></div>
    </div>

    <div class="box">
        <h3>Мои игры (Удаление)</h3>
        <div id="adminGameList"></div>
    </div>
</div>

<script>
/* ---------- 1. Устанавливаем пароль ---------- */
const ADMIN_PASSWORD = "ASjkn28hnaS_=21_--";   // <-- <‑‑ Замените на свой пароль

/* ---------- 2. Функция проверки пароля ---------- */
function checkPassword() {
    const entered = document.getElementById('adminPassInput').value;
    if (entered === ADMIN_PASSWORD) {
        // Скрываем окно ввода и показываем админ‑контент
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('adminContent').style.display = 'block';
        renderAdmin();   // сразу отрисуем списки
    } else {
        alert('Неверный пароль');
    }
}

/* ---------- 3. Данные (localStorage) ---------- */
let games   = JSON.parse(localStorage.getItem('games'))   || [];
let reviews = JSON.parse(localStorage.getItem('reviews')) || [];

/* ---------- 4. Рендеринг панели ---------- */
function renderAdmin() {
    // --- Ожидающие отзывы ---
    const pList = document.getElementById('pendingList');
    const pending = reviews.filter(r => r.status === 'pending');
    pList.innerHTML = pending.length
        ? pending.map(r => {
            const game = games.find(g => g.id === r.gameId);
            return `
                <div class="review-item">
                    <span><b>${r.userNick}</b> об игре <b>${game ? game.name : '???'}</b>: ${r.rate}/10 (${r.back})</span>
                    <div>
                        <button class="btn btn-add" onclick="approve(${r.id})">Одобрить</button>
                        <button class="btn btn-del" onclick="removeReview(${r.id})">Удалить</button>
                    </div>
                </div>`;
        }).join('')
        : '<i>Нет новых отзывов</i>';

    // --- Список игр ---
    const gList = document.getElementById('adminGameList');
    gList.innerHTML = games.map(g => `
        <div class="review-item">
            <span>${g.name} (⭐ ${g.rating}) – ${g.status}</span>
            <button class="btn btn-del" onclick="deleteGame(${g.id})">Удалить игру</button>
        </div>`).join('');
}

/* ---------- 5. Функции управления ---------- */
function addGame() {
    const name   = document.getElementById('gName').value.trim();
    const rating = Number(document.getElementById('gRate').value);
    const status = document.getElementById('gStatus').value;
    if (!name || !rating) return alert('Заполните все поля');

    const newGame = { id: Date.now(), name, rating, status };
    games.push(newGame);
    localStorage.setItem('games', JSON.stringify(games));
    renderAdmin();
}

function deleteGame(id) {
    if (!confirm('Удалить игру?')) return;
    games = games.filter(g => g.id !== id);
    localStorage.setItem('games', JSON.stringify(games));
    renderAdmin();
}

function approve(id) {
    const rev = reviews.find(r => r.id === id);
    if (rev) rev.status = 'approved';
    localStorage.setItem('reviews', JSON.stringify(reviews));
    renderAdmin();
}

function removeReview(id) {
    reviews = reviews.filter(r => r.id !== id);
    localStorage.setItem('reviews', JSON.stringify(reviews));
    renderAdmin();
}

/* ---------- 6. Инициализация (если уже авторизованы) ---------- */
// Если пользователь уже прошёл проверку (например, сохранили в sessionStorage),
// можно сразу отобразить админ‑контент. В примере — каждый раз вводим пароль.
</script>
</body>
</html>
