<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Game Tracker — Общее + Админка</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<style>
body { background:#0f172a; color:#f1f5f9; font-family:sans-serif; margin:0; padding:20px; }
h1 { text-align:center; margin-bottom:20px; }
.header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; }
button { cursor:pointer; border:none; padding:8px 16px; border-radius:6px; background:#38bdf8; color:#1e293b; font-weight:bold; margin-left:10px; }
#adminSection { display:none; background:#1e293b; padding:15px; border-radius:10px; margin-top:20px; width:100%; }
#loginArea { text-align:right; flex:1; }
#gamesDisplay { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:15px; margin-top:20px; }
.gameCard { background:#1e293b; border-radius:10px; padding:15px; border:1px solid #334155; position:relative; }
.rating { color:#fbbf24; font-weight:bold; }
.gameImage { width:100%; max-height:180px; overflow:hidden; margin-bottom:10px; }
.gameImage img { width:100%; object-fit:cover; height:auto; border-radius:6px; }
#reviewForm { margin-top:30px; padding:15px; background:#1e293b; border-radius:10px; display:none; }
input, select { padding:8px; width: calc(100% - 20px); margin-bottom:10px; border:none; border-radius:6px; background:#334155; color:#fff; }
.btn { background:#38bdf8; padding:8px 20px; margin-right:10px; font-weight:bold; border:none; border-radius:6px; cursor:pointer; }
#authSection { margin-bottom:10px; }
#userInfo { margin-top:10px; font-weight:bold; }
</style>
</head>
<body>

<h1>🎮 Объединённый Трекер игр</h1>

<div class="header" id="header">
  <div id="authArea"><button onclick="showLogin()">Войти</button></div>
  <div id="userInfo"></div>
</div>

<!-- Админская панель -->
<div id="adminSection">
  <h2>👑 Админ-панель</h2>
  <button onclick="logout()">Выйти</button>
  <h3>Добавить игру</h3>
  <input type="text" id="newGameName" placeholder="Название игры" />
  <input type="number" id="newGameRating" placeholder="Оценка 1-10" min="1" max="10" />
  <select id="newGameStatus">
    <option value="Пройдено">Пройдено</option>
    <option value="В процессе">В процессе</option>
    <option value="В планах">В планах</option>
  </select>
  <label>Картинка к игре:</label>
  <input type="file" id="newGameImage" accept="image/*" />
  <button class="btn" onclick="addGame()">Добавить игру</button>
  <h3>Удалить игру</h3>
  <div id="gameList"></div>
  <h3>Модерация отзывов</h3>
  <div id="reviewModeration"></div>
</div>

<!-- Отзыв для обычных пользователей -->
<div id="reviewForm">
  <h3>Оставить отзыв</h3>
  <select id="reviewGameSelect"><option value="">Выберите игру</option></select>
  <input type="number" id="reviewRating" placeholder="Оценка 1-10" min="1" max="10" />
  <select id="reviewBack">
    <option value="yes">Вернусь</option>
    <option value="no">Не вернусь</option>
    <option value="maybe">Возможно</option>
  </select>
  <button class="btn" onclick="submitUserReview()">Отправить</button>
</div>

<h2>🎮 Игры</h2>
<div id="gamesDisplay"></div>

<!-- Модалка для входа -->
<div id="loginModal" style="display:none; position:fixed; top:20%; left:50%; transform:translateX(-50%); background:#1e293b; padding:20px; border-radius:10px; border:1px solid #38bdf8; z-index:1000;">
<h4>Введите свои данные</h4>
<input type="email" id="loginEmail" placeholder="Email" />
<input type="password" id="loginPass" placeholder="Пароль" />
<button class="btn" onclick="login()">Войти</button>
<button class="btn" onclick="closeLogin()">Отмена</button>
</div>

<script>
  // ВАШИ ключи Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyCeQmPBVXyoJdfwZRoINJonFmPMmrBGH30",
    authDomain: "mygametracker-44a38.firebaseapp.com",
    projectId: "mygametracker-44a38",
    storageBucket: "mygametracker-44a38.firebasestorage.app",
    messagingSenderId: "756062929019",
    appId: "1:756062929019:web:7c484a6d691f441a2fe2de",
    measurementId: "G-1JQYS1VV4L"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const storage = firebase.storage();

  let isAdmin = false;
  const ADMIN_EMAIL = "werker196@gmail.com"; // Ваша почта
  // ВАЖНО: замените на вашу реальную почту, чтобы сравнение работало
  
  window.onload = () => { loadUser(); };

  async function loadUser() {
    const user = JSON.parse(localStorage.getItem('siteUser'));
    if (user && user.email === ADMIN_EMAIL) {
      // автоматический вход для вас активен
      loginAsAdmin();
    } else if (user) {
      // обычный пользователь
      loginAsUser(user.nick || user.email);
    } else {
      showLogin();
    }
    await loadGames();
    if (isAdmin) loadAdminPanel();
    else loadUserReviewForm();
  }

  function showLogin() {
    document.getElementById('authArea').innerHTML = `<button onclick="showLoginModal()">Войти</button>`;
    document.getElementById('userInfo').innerHTML = '';
    document.getElementById('adminSection').style.display='none';
    document.getElementById('reviewForm').style.display='none';
  }

  function showLoginModal() {
    document.getElementById('loginModal').style.display='block';
  }
  function closeLogin() {
    document.getElementById('loginModal').style.display='none';
  }

  async function login() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPass').value.trim();
    try {
      await firebase.auth().signInWithEmailAndPassword(email, pass);
      localStorage.setItem('siteUser', JSON.stringify({ email, nick: email }));
      loadUser();
    } catch(e) {
      alert('Ошибка: ' + e.message);
    }
  }

  function loginAsUser(nick) {
    isAdmin = false;
    document.getElementById('authArea').innerHTML=`<button onclick="showLogin()">Выйти</button>`;
    document.getElementById('userInfo').innerHTML='Вы вошли как '+(nick||'пользователь');
  }

  function loginAsAdmin() {
    isAdmin = true;
    document.getElementById('authArea').innerHTML=`<button onclick="logout()">Выйти</button>`;
    document.getElementById('userInfo').innerHTML='Вы вошли как <b>Админ</b>';
    loadAdminPanel();
  }

  async function logout() {
    await firebase.auth().signOut();
    localStorage.removeItem('siteUser');
    isAdmin = false;
    loadUser();
  }

  // Загрузка игр
  async function loadGames() {
    const snap = await db.collection('games').get();
    document.getElementById('gamesDisplay').innerHTML='';
    snap.forEach(doc => {
      const g = {id: doc.id, ...doc.data()};
      let imgHtml='';
      if (g.imageUrl) imgHtml=`<div class="gameImage"><img src="${g.imageUrl}" /></div>`;
      document.getElementById('gamesDisplay').innerHTML+=`
        <div class="gameCard">
          ${imgHtml}
          <h3>${g.name}</h3>
          <p><b>⭐${g.rating}/10</b>, ${g.status}</p>
        </div>`;
    });
    // Обновляем список для отзывов
    const sel = document.getElementById('reviewGameSelect');
    sel.innerHTML='<option value="">Выберите игру</option>' + 
      (await db.collection('games').get()).docs.map(g=>`<option value="${g.id}">${g.data().name}</option>`).join();
  }

  // Работа с админкой
  async function loadAdminPanel() {
    if (!isAdmin) return;
    const snap = await db.collection('reviews').where('status','==','pending').get();
    document.getElementById('reviewModeration').innerHTML='';
    if (snap.empty) {
      document.getElementById('reviewModeration').innerHTML='Нет отзывов на модерации.';
    } else {
      snap.forEach(r => {
        const data = r.data();
        document.getElementById('reviewModeration').innerHTML+=`
          <div>📝 ${data.userNick}: <b>${data.rate}</b>/10 (${data.back})</div>
          <button onclick="approveRev('${r.id}')">✓ Одобрить</button>
          <button onclick="rejectRev('${r.id}')">✗ Удалить</button><hr>`;
      });
    }
  }
  window.approveRev = async (id) => {
    await db.collection('reviews').doc(id).update({status:'approved'});
    loadAdminPanel(); loadGames();
  }
  window.rejectRev = async (id) => {
    await db.collection('reviews').doc(id).delete();
    loadAdminPanel();
  }

  async function deleteGame(id) {
    if (confirm('Удалить игру?')) {
      await db.collection('games').doc(id).delete();
      const revs = await db.collection('reviews').where('gameId','==',id).get();
      for (const r of revs.docs) await db.collection('reviews').doc(r.id).delete();
      loadGames(); loadAdminPanel();
    }
  }

  async function addGame() {
    const name = document.getElementById('newGameName').value.trim();
    const rating = parseInt(document.getElementById('newGameRating').value);
    const status = document.getElementById('newGameStatus').value;
    const imageFile = document.getElementById('newGameImage').files[0];

    if (!name || !rating) return alert('Заполните всё');
    let imageUrl='';
    if (imageFile) {
      const ref = storage.ref().child('game_images/'+Date.now()+'.jpg');
      await ref.put(imageFile);
      imageUrl=await ref.getDownloadURL();
    }
    await db.collection('games').add({name, rating, status, imageUrl});
    document.getElementById('newGameName').value=''; 
    document.getElementById('newGameRating').value=''; 
    loadGames();
    loadAdminPanel();
  }

  // Оставить отзыв
async function submitUserReview() {
  const gameId = document.getElementById('reviewGameSelect').value;
  const rate = document.getElementById('reviewRating').value;
  const back = document.getElementById('reviewBack').value;
  const user = JSON.parse(localStorage.getItem('siteUser'));
  if (!gameId || !rate || !user) return alert('Заполните всё');
  await db.collection('reviews').add({
    gameId, rate, back, userNick: user.nick || user.email, status:'pending', created: new Date()
  });
  alert('Отзыв отправлен на модерацию!');
  document.getElementById('reviewRating').value='';
  document.getElementById('reviewGameSelect').value='';
}
function loadUserReviewForm() {
  document.getElementById('reviewForm').style.display='block';
  loadGames();
}
</script>
