<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Мой игровой трекер</title>
<!-- Шрифты и иконки -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet"/>
<!-- Иконки -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
<style>
body {
  margin: 0;
  font-family: 'Roboto', sans-serif;
  background: linear-gradient(135deg, #141e30, #243b55);
  color: #fff;
  min-height: 100vh;
}
h1 {
  text-align: center;
  padding: 20px;
  font-size: 2.8rem;
}
.menu {
  display: flex;
  justify-content: center;
  margin-bottom: 20px;
}
button {
  background: #00b894;
  border: none;
  border-radius: 8px;
  padding: 12px 24px;
  margin: 0 10px;
  font-family: 'Roboto', sans-serif;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.3s, transform 0.2s;
  font-size: 1rem;
}
button:hover {
  background:#019778;
  transform: translateY(-2px);
}
#authSection {
  display: flex;
  justify-content: center;
  margin-bottom: 15px;
}
#authContainer {
  display: flex;
  flex-direction: column;
  align-items: center;
  max-width: 400px;
  margin: 0 auto;
}
#authContainer > div {
  display: none;
  width: 100%;
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 12px;
  margin-top: 10px;
}
#authContainer > div.active {
  display: block;
}
#authContainer input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 6px;
  border: none;
  font-family: 'Roboto', sans-serif;
  font-size: 1rem;
}
#content {
  max-width: 1024px;
  margin: 0 auto 40px;
  padding: 0 20px;
}
#games {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap: 20px;
  margin-top: 20px;
}
.game {
  background: rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 15px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  transition: transform 0.2s, box-shadow 0.2s;
}
.game:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}
.game img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 8px;
  margin-bottom: 10px;
}
#adminPanel {
  background: rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 20px;
  margin-top: 30px;
}
h4 {
  margin-top: 20px;
}
#gameListAdmin, #reviewsModeration {
  max-height: 200px;
  overflow-y: auto;
  background: rgba(255,255,255,0.05);
  padding: 10px;
  border-radius: 8px;
  margin-top: 10px;
}
#gameListAdmin div, #reviewsModeration div {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
#gameListAdmin button, #reviewsModeration button {
  margin-left: 10px;
  padding: 6px 12px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  font-weight: 600;
}
#gameListAdmin button { background: #f39c12; color: #fff; }
#reviewsModeration button { background: #e74c3c; color: #fff; }
#addEditContainer {
  margin-top: 20px;
}
#addGameForm, #editGameForm {
  padding: 15px;
  background: rgba(255,255,255,0.15);
  border-radius: 12px;
  margin-top: 10px;
}
#addGameForm input, #editGameForm input, #addGameForm select, #editGameForm select {
  width: calc(50% - 10px);
  margin: 8px;
  padding: 10px;
  border-radius: 6px;
  border: none;
}
#saveGameBtn, #saveEditedBtn {
  width: 100%;
  background: #4CAF50;
  color: #fff;
  font-weight: 700;
  margin-top: 15px;
}
#saveEditedBtn { background: #2196F3; }
#cancelEditBtn { background: #f44336; }
#reviewSection {
  margin-top: 30px;
}
#reviewSection select, #reviewSection input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 6px;
  border: none;
}
</style>
</head>
<body>

<h1>🎮 Мой расширенный игровой трекер</h1>

<!-- Кнопка первичного входа/регистрации -->
<div id="authSection">
  <button onclick="showAuth()">Войти / Регистрация</button>
</div>

<!-- Формы входа/регистрации -->
<div id="authContainer" style="display:none;">
  <!-- Вход -->
  <div id="loginFormCont">
    <h3>Войти</h3>
    <input type="email" id="loginEmail" placeholder="Email" />
    <input type="password" id="loginPassword" placeholder="Пароль" />
    <button onclick="performLogin()">Войти</button>
  </div>
  <!-- Регистрация -->
  <div id="registerFormCont" style="display:none;">
    <h3>Регистрация</h3>
    <input type="text" id="registerNick" placeholder="Ник" />
    <input type="email" id="registerEmail" placeholder="Email" />
    <input type="password" id="registerPassword" placeholder="Пароль" />
    <button onclick="performRegister()">Зарегистрироваться</button>
  </div>
  <button onclick="hideAuth()">Отмена</button>
</div>

<!-- Отдельная кнопка для переключения -->
<div style="text-align:center; margin:15px 0; display:none;" id="authBtnsContainer">
  <button onclick="showLogin()">Вход</button>
  <button onclick="showRegister()">Регистрация</button>
</div>

<!-- Основной контент -->
<div id="mainContent" style="display:none;">
  <p>Вы вошли как: <b id="userLabel"></b></p>
  <button onclick="logout()">Выйти</button>

  <!-- Админская панель -->
  <div id="adminPanel" style="display:none; margin-top:20px; background: #fff; color:#000; border-radius:12px; padding:20px;">
    <h3>👑 Админка</h3>
    <button onclick="showAddGame()">Добавить / Редактировать игру</button>
    <button onclick="loadAdminTools()">Обновить список</button>
    
    <!-- Добавление / редактирование -->
    <div id="addEditContainer" style="margin-top:15px;">
      <div id="addGameForm" style="display:none;">
        <h4>Добавить новую игру</h4>
        <input type="text" id="newGameName" placeholder="Название" />
        <input type="number" id="newGameRating" placeholder="Рейтинг" min="1" max="10" />
        <select id="newGameStatus">
          <option>Пройдено</option>
          <option>В процессе</option>
          <option>В планах</option>
        </select>
        <input type="file" id="newGameImage" accept="image/*" />
        <button onclick="saveGame()">Сохранить</button>
      </div>
      
      <!-- Редактирование -->
      <div id="editGameContainer" style="display:none;">
        <h4>Редактировать игру</h4>
        <input type="hidden" id="editGameId" />
        <input type="text" id="editGameName" placeholder="Название" />
        <input type="number" id="editGameRating" placeholder="Рейтинг" min="1" max="10" />
        <select id="editGameStatus">
          <option>Пройдено</option>
          <option>В процессе</option>
          <option>В планах</option>
        </select>
        <input type="file" id="editGameImage" accept="image/*" />
        <button id="saveEditedBtn" onclick="saveEditedGame()">Обновить</button>
        <button id="cancelEditBtn" onclick="hideEditGame()">Отмена</button>
      </div>
    </div>
    
    <h4>Модерация отзывов</h4>
    <div id="reviewsModeration" style="max-height:200px; overflow:auto; background: #eee; color:#000; padding:10px; border-radius:8px;"></div>
    
    <h4>Список игр на удаление/редактирование</h4>
    <div id="gameListAdmin"></div>
  </div>

  <!-- Все игры -->
  <h3>Все игры</h3>
  <div id="games"></div>

  <!-- Отзыв -->
  <div style="margin-top:30px;">
    <h4>Оставить отзыв</h4>
    <select id="reviewGame"></select>
    <input type="number" id="reviewRating" placeholder="Оценка 1-10" min="1" max="10" />
    <select id="reviewBack">
      <option value="yes">Вернусь</option>
      <option value="no">Не вернусь</option>
      <option value="maybe">Возможно</option>
    </select>
    <button onclick="submitReview()">Отправить</button>
  </div>
</div>

<!-- Скрипт -->
<script>
  // Вставьте сюда ваши firebase ключи
  const firebaseConfig = {
    apiKey: "AIzaSyCeQmPBVXyoJdfwZRoINJonFmPMmrBGH30",
    authDomain: "mygametracker-44a38.firebaseapp.com",
    projectId: "mygametracker-44a38",
    storageBucket: "mygametracker-44a38.appspot.com",
    messagingSenderId: "756062929019",
    appId: "1:756062929019:web:7c484a6d691f441a2fe2de",
    measurementId: "G-1JQYS1VV4L"
  };

  // Инициализация Firebase
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  const db = firebase.firestore();
  const storage = firebase.storage();
  const ADMIN_EMAIL = "werker196@gmail.com";
  let isAdmin=false;

  // Управление видами форм
  function showAuth() {
    document.getElementById('authContainer').style.display='flex';
    document.getElementById('authSection').style.display='none';
    document.getElementById('authBtnsContainer').style.display='block';
  }
  function hideAuth() {
    document.getElementById('authContainer').style.display='none';
    document.getElementById('authSection').style.display='block';
    document.getElementById('authBtnsContainer').style.display='none';
  }
  function showLogin() {
    document.getElementById('loginForm').style.display='block';
    document.getElementById('registerFormCont').style.display='none';
  }
  function showRegister() {
    document.getElementById('loginForm').style.display='none';
    document.getElementById('registerFormCont').style.display='block';
  }

  // Вход
  async function performLogin() {
    try {
      await auth.signInWithEmailAndPassword(
        document.getElementById('loginEmail').value.trim(),
        document.getElementById('loginPassword').value.trim()
      );
    } catch(e) { alert('Ошибка входа: ' + e.message); }
  }

  // Регистрация
  async function performRegister() {
    try {
      const cred=await auth.createUserWithEmailAndPassword(
        document.getElementById('registerEmail').value.trim(),
        document.getElementById('registerPassword').value.trim()
      );
      await cred.user.updateProfile({ displayName: document.getElementById('registerNick').value.trim() });
    } catch(e){ alert('Ошибка регистрации: ' + e.message); }
  }

  // Обработка статуса входа
  auth.onAuthStateChanged(user => {
    if(user) {
      document.getElementById('mainContent').style.display='block';
      document.getElementById('userLabel').innerText=''+(user.displayName || user.email);
      document.getElementById('authSection').style.display='none';
      document.getElementById('authContainer').style.display='none';
      if(user.email===ADMIN_EMAIL){ isAdmin=true; loginAsAdmin(); } else { isAdmin=false; loginAsUser(); }
    } else {
      document.getElementById('mainContent').style.display='none';
      document.getElementById('authSection').style.display='block';
    }
  });

  function loginAsUser() {
    // Пользователь
  }

  function loginAsAdmin() {
    document.getElementById('adminPanel').style.display='block';
    loadAdminTools();
    loadGames();
  }
  // Выйти
  async function logout() {
    await auth.signOut();
  }

  // В основном контенте
  async function loadGames() {
    const snap= await db.collection('games').get();
    document.getElementById('games').innerHTML='';
    document.getElementById('reviewGame').innerHTML='<option value="">Выберите игру</option>';
    snap.forEach(g => {
      const data=g.data();
      let img=data.imageUrl?`<img src="{data.imageUrl}"/>`:'';
      document.getElementById('games').innerHTML+=`<div class="game">${img}<h4>${data.name}</h4><p>⭐${data.rating}/10, ${data.status}</p></div>`;
      // добавляем в отзыв
      document.getElementById('reviewGame').innerHTML+=`<option value="${g.id}">${data.name}</option>`;
    });
  }

  async function loadAdminTools() {
    const user=await auth.currentUser;
    if(!user || user.email!==ADMIN_EMAIL) return;
    // отзывы
    const snap=await db.collection('reviews').where('status','==','pending').get();
    const revDiv=document.getElementById('reviewsModeration');
    revDiv.innerHTML='';
    if(snap.empty){ revDiv.innerHTML='Нет отзывов на модерации.'; } 
    else {
      snap.forEach(r => {
        const d=r.data();
        revDiv.innerHTML+=`<div>📝 ${d.userNick}: <b>${d.rate}</b>/10 (${d.back})</div>
        <button onclick="approveRev('${r.id}')">✓ Одобрить</button>
        <button onclick="rejectRev('${r.id}')">✗ Удалить</button><hr>`;
      });
    }
    // список игр
    const docs=await db.collection('games').get();
    document.getElementById('gameListAdmin').innerHTML='';
    docs.forEach(g => {
      const d=g.data();
      document.getElementById('gameListAdmin').innerHTML+=`
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span>${d.name}</span>
        <div>
          <button onclick="editGame('${g.id}')">Редактировать</button>
          <button onclick="deleteGame('${g.id}')">Удалить</button>
        </div>
      </div>`;
    });
  }
  async function approveRev(id) {
    await db.collection('reviews').doc(id).update({status:'approved'}); loadAdminTools();
  }
  async function rejectRev(id) {
    await db.collection('reviews').doc(id).delete(); loadAdminTools();
  }
  async function deleteGame(id) {
    if(confirm('Удалить игру?')){
      await db.collection('games').doc(id).delete();
      const revs= await db.collection('reviews').where('gameId','==',id).get();
      for(const r of revs.docs) await db.collection('reviews').doc(r.id).delete();
      loadGames(); loadAdminTools();
    }
  }

  async function saveGame() {
    const name=document.getElementById('newGameName').value.trim();
    const rating=parseInt(document.getElementById('newGameRating').value);
    const status=document.getElementById('newGameStatus').value;
    const file=document.getElementById('newGameImage').files[0];
    if(!name || !rating){ alert('Заполните всё!'); return; }
    let imageUrl='';
    if(file){
      const ref=storage.ref().child('game_images/'+Date.now()+'.jpg');
      await ref.put(file);
      imageUrl=await ref.getDownloadURL();
    }
    await db.collection('games').add({name,rating,status,imageUrl});
    document.getElementById('newGameName').value=''; document.getElementById('newGameRating').value='';
    loadGames(); loadAdminTools();
  }
  async function editGame(id) {
    const doc=await db.collection('games').doc(id).get();
    const data=doc.data();
    document.getElementById('editGameId').value=id;
    document.getElementById('editGameName').value=data.name;
    document.getElementById('editGameRating').value=data.rating;
    document.getElementById('editGameStatus').value=data.status;
    document.getElementById('editGameForm').style.display='block';
  }
  function showAddGame(){
    document.getElementById('editGameForm').style.display='block';
    document.getElementById('editGameId').value='';
    document.getElementById('editGameName').value='';
    document.getElementById('editGameRating').value='';
    document.getElementById('editGameStatus').value='Пройдено';
  }
  function hideEditGame(){ document.getElementById('editGameForm').style.display='none'; }
  async function saveEditedGame() {
    const id= document.getElementById('editGameId').value;
    const name=document.getElementById('editGameName').value.trim();
    const rating=parseInt(document.getElementById('editGameRating').value);
    const status=document.getElementById('editGameStatus').value;
    const file=document.getElementById('editGameImage').files[0];

    if(!name || !rating){ alert('Заполните всё!'); return; }

    const updateData={name, rating, status};
    if(file){
      const ref=storage.ref().child('game_images/'+Date.now()+'.jpg');
      await ref.put(file);
      updateData.imageUrl=await ref.getDownloadURL();
    }
    await db.collection('games').doc(id).update(updateData);
    hideEditGame(); loadGames(); loadAdminTools();
  }
  
  async function submitReview() {
    const gameId=document.getElementById('reviewGame').value;
    const rate=document.getElementById('reviewRating').value;
    const back=document.getElementById('reviewBack').value;
    const user=JSON.parse(localStorage.getItem('siteUser'));
    if(!gameId || !rate || !user){ alert('Заполните всё!'); return; }
    await db.collection('reviews').add({
      gameId, rate, back, userNick: user.nick || user.email, status:'pending', created: new Date()
    });
    alert('Отзыв отправлен! Он ожидает модерации.');
    document.getElementById('reviewRating').value='';
    document.getElementById('reviewGame').value='';
  }

  // -- Функции кнопок и интерфейса --
  function showAuth() {
    document.getElementById('authContainer').style.display='flex';
    document.getElementById('authSection').style.display='none';
    document.getElementById('authBtnsContainer').style.display='block';
    showLogin();
  }
  function hideAuth() {
    document.getElementById('authContainer').style.display='none';
    document.getElementById('authSection').style.display='block';
    document.getElementById('authBtnsContainer').style.display='none';
  }
  function showLogin() {
    document.getElementById('loginForm').style.display='block';
    document.getElementById('registerFormCont').style.display='none';
  }
  function showRegister() {
    document.getElementById('loginForm').style.display='none';
    document.getElementById('registerFormCont').style.display='block';
  }

</script>
</body>
</html>
