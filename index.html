<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Игровой трекер | Вход и Регистрация</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<style>
body { background:#2b2d42; font-family:sans-serif; margin:0; padding:20px; color:#fff; }
h1 { text-align:center; margin-bottom:15px; }
.menu { display:flex; justify-content: center; gap:12px; margin-bottom:20px; }
button { border:none; padding:10px 20px; border-radius:6px; cursor:pointer; font-weight:bold; font-size:1rem; background:#00b894; color:#fff; transition: background 0.3s; }
button:hover { background:#019778; }
#authButtons { margin-top:10px; display:flex; justify-content: center; gap:10px; }
input, select { display:block; width:250px; margin:10px auto; padding:8px; border:none; border-radius:6px; background:#4ecca3; color:#222; }
#content { max-width:960px; margin:0 auto; }
#games { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:16px; margin-top:20px; }
.game { background:#3b3e49; padding:15px; border-radius:8px; border:2px solid #222; overflow:hidden; }
.game img { width:100%; border-radius:4px; margin-bottom:10px; max-height:200px; object-fit:cover; }
#reviewBox { margin-top:20px; }
#reviews { margin-top:20px; max-height:300px; overflow-y:auto; }
#modalOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:999; }
#modal { background:#222; padding:20px; border-radius:10px; max-width:300px; text-align:center; color:#fff; }
</style>
</head>
<body>

<h1>🎮 Мой игровой трекер</h1>
<div class="menu">
  <button id="btnAuth" onclick="showAuth()">Войти / Регистрация</button>
</div>

<div id="authButtons"></div>

<div id="modalOverlay">
  <div style="background:#222; padding:20px; border-radius:10px; max-widht:300px; margin:auto;">
    <h4>Введите свои данные</h4>
    <input type="email" id="modalEmail" placeholder="Email" />
    <input type="password" id="modalPassword" placeholder="Пароль" />
    <br>
    <button onclick="modalLogin()">Войти</button>
    <button onclick="closeModal()">Отмена</button>
  </div>
</div>

<div id="content" style="display:none;">
  <div id="userPanel">
    <p>Вы вошли как: <b id="userEmail"></b></p>
    <button onclick="logout()">Выйти</button>
  </div>

  <div id="adminPanel" style="display:none; background:#222; padding:15px; border-radius:10px; margin-bottom:20px;">
    <h3>👑 Админка</h3>
    <button onclick="logout()">Выйти из админки</button>
    <h4>Добавить игру</h4>
    <input type="text" id="gameName" placeholder="Название игры" />
    <input type="number" id="gameRating" placeholder="Рейтинг 1-10" min="1" max="10" />
    <select id="gameStatus">
      <option>Пройдено</option><option>В процессе</option><option>В планах</option>
    </select>
    <br><br>
    <label>Картинка к игре:</label>
    <input type="file" id="gameImageFile" accept="image/*" />
    <br><br>
    <button onclick="addGame()">Добавить игру</button>
    <h4>Удалить игру</h4>
    <div id="gameList"></div>
    <h4>Модерация отзывов</h4>
    <div id="reviewsModeration"></div>
  </div>

  <h3>Игры</h3>
  <div id="games"></div>

  <div id="reviewBox" style="margin-top:20px; display:none;">
    <h4>Оставить отзыв</h4>
    <select id="reviewGame"></select>
    <input type="number" id="reviewRating" placeholder="Оценка 1-10" min="1" max="10" />
    <select id="reviewBack">
      <option value="yes">Вернусь</option>
      <option value="no">Не вернусь</option>
      <option value="maybe">Возможно</option>
    </select>
    <br><br>
    <button onclick="submitReview()">Отправить</button>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCeQmPBVXyoJdfwZRoINJonFmPMmrBGH30",
  authDomain: "mygametracker-44a38.firebaseapp.com",
  projectId: "mygametracker-44a38",
  storageBucket: "mygametracker-44a38.firebasestorage.app",
  messagingSenderId: "756062929019",
  appId: "1:756062929019:web:7c484a6d691f441a2fe2de",
  measurementId: "G-1JQYS1VV4L"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

const ADMIN_EMAIL = "werker196@gmail.com";

let isAdmin = false;

window.onload = () => {
  auth.onAuthStateChanged(user => {
    if (user) {
      localStorage.setItem('siteUser', JSON.stringify({email: user.email, nick: user.displayName || user.email}));
      if (user.email === ADMIN_EMAIL) {
        loginAsAdmin();
      } else {
        loginAsUser(user.displayName || user.email);
      }
    } else {
      localStorage.removeItem('siteUser');
      showAuth();
    }
    loadData();
  });
};

function showAuth() {
  document.getElementById('authButtons').innerHTML= '<button onclick="showModal()">Войти / Регистрация</button>';
  document.getElementById('content').style.display='none';
}

// Правильная функция открытия окна
function showModal() {
  document.getElementById('modalOverlay').style.display='flex';
}
// и закрытия
function closeModal() {
  document.getElementById('modalOverlay').style.display='none';
}

async function modalLogin() {
  const email = document.getElementById('modalEmail').value.trim();
  const pass = document.getElementById('modalPassword').value.trim();
  try {
    await auth.signInWithEmailAndPassword(email, pass);
    document.getElementById('modalEmail').value='';
    document.getElementById('modalPassword').value='';
    closeModal();
  } catch(e){ alert('Ошибка: ' + e.message); }
}

async function register() {
  const email = document.getElementById('registerEmail').value.trim();
  const nick = document.getElementById('registerNick').value.trim();
  const pass = document.getElementById('registerPassword').value.trim();
  try {
    const u = await auth.createUserWithEmailAndPassword(email, pass);
    await u.user.updateProfile({ displayName: nick });
    localStorage.setItem('siteUser', JSON.stringify({email, nick}));
    alert('Регистрация прошла успешно! Войдите.');
  } catch(e){ alert('Ошибка: ' + e.message); }
}

async function login() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPassword').value.trim();
  try {
    await auth.signInWithEmailAndPassword(email, pass);
  } catch(e){ alert('Ошибка: ' + e.message); }
}

function loginAsUser(nick) {
  document.getElementById('content').style.display='block';
  document.getElementById('userInfo').innerHTML='Вы вошли как: <b>' + (nick || 'пользователь') + '</b>';
  document.getElementById('adminPanel').style.display='none';
  document.getElementById('reviewBox').style.display='block';
}

// Тут для проверки — это ваш аккаунт или нет
function loginAsAdmin() {
  document.getElementById('content').style.display='block';
  document.getElementById('userInfo').innerHTML='Вы вошли как <b>Админ</b>';
  document.getElementById('adminPanel').style.display='block';
  loadAdminTools();
  loadGames();
}

async function logout() {
  await auth.signOut();
}

async function loadData() {
  await loadGames();
  if (isAdmin) loadAdminTools();
  else loadUserReviews();
}

async function loadGames() {
  const snap = await db.collection('games').get();
  document.getElementById('games').innerHTML='';
  snap.forEach(doc => {
    const g = {id: doc.id, ...doc.data()};
    let img=`{g.imageUrl ? `<img src="${g.imageUrl}" />` : ''}`;
    document.getElementById('games').innerHTML+=`
      <div class="game" style="background:#4e607f;">${img}
        <h4>${g.name}</h4>
        <p>⭐${g.rating}/10, ${g.status}</p>
      </div>`;
  });
  // Обновляем селект для отзывов
  const sel = document.getElementById('reviewGame');
  sel.innerHTML='<option value="">Выберите игру</option>';
  const docs = await db.collection('games').get();
  docs.forEach(g => {
    const data=g.data();
    sel.innerHTML+=`<option value="${g.id}">${data.name}</option>`;
  });
}

async function loadAdminTools() {
  const user = await auth.currentUser;
  if (user.email !== 'werker196@gmail.com') return; // проверка на админский email
  // модерация отзывов
  const snap = await db.collection('reviews').where('status','==','pending').get();
  document.getElementById('reviewsModeration').innerHTML='';
  if (snap.empty) {
    document.getElementById('reviewsModeration').innerHTML='Нет отзывов на модерации.';
  } else {
    snap.forEach(r => {
      const d = r.data();
      document.getElementById('reviewsModeration').innerHTML+=`
      <div>📝 ${d.userNick}: <b>${d.rate}</b>/10 (${d.back})</div>
      <button onclick="approveRev('${r.id}')">✓ Одобрить</button>
      <button onclick="rejectRev('${r.id}')">✗ Удалить</button><hr>`;
    });
  }
  // список игр для удаления
  const docs = await db.collection('games').get();
  document.getElementById('gameList').innerHTML='';
  docs.forEach(g => {
    const data=g.data();
    document.getElementById('gameList').innerHTML+=`✔️ ${data.name} <button onclick="deleteGame('${g.id}')">Удалить</button><br>`;
  });
}

window.approveRev = async (id) => {
  await db.collection('reviews').doc(id).update({status:'approved'});
  loadAdminTools(); loadGames();
}
window.rejectRev = async (id) => {
  await db.collection('reviews').doc(id).delete();
  loadAdminTools();
}
async function deleteGame(id) {
  if (confirm('Удалить игру?')) {
    await db.collection('games').doc(id).delete();
    const revs = await db.collection('reviews').where('gameId','==',id).get();
    for (const r of revs.docs) await db.collection('reviews').doc(r.id).delete();
    loadGames(); loadAdminTools();
  }
}
async function addGame() {
  const name = document.getElementById('gameName').value.trim();
  const rating = parseInt(document.getElementById('gameRating').value);
  const status = document.getElementById('gameStatus').value;
  const file = document.getElementById('gameImageFile').files[0];
  if (!name || !rating) { alert('Заполните всё!'); return; }
  let imageUrl='';
  if (file) {
    const ref = storage.ref().child('game_images/'+Date.now()+'.jpg');
    await ref.put(file);
    imageUrl=await ref.getDownloadURL();
  }
  await db.collection('games').add({name, rating, status, imageUrl});
  document.getElementById('gameName').value=''; 
  document.getElementById('gameRating').value=''; 
  loadGames(); loadAdminTools();
}
async function submitReview() {
  const gameId = document.getElementById('reviewGame').value;
  const rate = document.getElementById('reviewRating').value;
  const back = document.getElementById('reviewBack').value;
  const user = JSON.parse(localStorage.getItem('siteUser'));
  if (!gameId || !rate || !user) { alert('Заполните всё'); return; }
  await db.collection('reviews').add({
    gameId, rate, back, userNick: user.nick || user.email, status:'pending', created: new Date()
  });
  alert('Отзыв отправлен на модерацию!');
  document.getElementById('reviewRating').value=''; document.getElementById('reviewGame').value='';
}
</script>
