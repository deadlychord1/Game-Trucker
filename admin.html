<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Администрирование — игровой трекер</title>
<style>
/* Основной стиль */
body { font-family: Arial, sans-serif; padding: 20px; background: #222; color: #fff; }
h1 { text-align: center; }
input { width: 100%; margin-bottom: 10px; padding: 8px; }
button { padding: 10px 20px; }
</style>
</head>
<body>
<h1>🔑 Вход в управленческую панель</h1>
<div style="max-width:300px; margin:auto;">
<input type="password" id="adminPassword" placeholder="Пароль"/>
<button onclick="checkPassword()">Войти</button>
</div>
<div id="adminPanel" style="display:none; margin-top:20px;">
<h2>Добро пожаловать! Управление трекером</h2>
<p>Здесь вы можете добавлять, редактировать, удалять игры.</p>
<!-- Код управлений здесь -->
<div>
<label>Название игры:</label><input type="text" id="gameName">
<label>Оценка (1-10):</label><input type="number" id="gameRating" min="1" max="10">
<label>Статус:</label>
<select id="gameStatus">
<option value="planned">В планах</option>
<option value="yes">Вернусь-да</option>
<option value="maybe">Возможно</option>
<option value="no">Не вернусь</option>
</select>
<button onclick="addGame()">Добавить игру</button>
</div>
<!-- Тут можно добавить список игр для редактирования, удаления -->
<div id="gameList"></div>
<!-- И список для просмотра и оценки отзывов пользователей -->
</div>

<script>
// Простенький скрипт для проверки пароля
const PASSWORD = "вашпароль"; // замените на свой пароль
function checkPassword() {
  const inputPass = document.getElementById('adminPassword').value;
  if (inputPass === PASSWORD) {
    document.getElementById('adminPanel').style.display = 'block';
    alert('Добро пожаловать, Админ!');
    // Тут можно добавить функции для управлений
  } else {
    alert('Неверный пароль');
  }
}
</script>

</body>
</html>
