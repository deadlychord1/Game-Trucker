<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Игровой трекер</title>
<!-- Шрифты и иконки для красоты -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet"/>
<style>
body {
  margin: 0;
  font-family: 'Roboto', sans-serif;
  background: linear-gradient(135deg, #1f1c2c, #928dab);
  color:#fff;
  min-height: 100vh;
  padding: 20px;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
  font-size: 2.5rem;
}

.menu {
  display: flex;
  justify-content: center;
  gap: 14px;
  margin-bottom: 20px;
}

/* Кнопки */
button {
  background-color: #ff6f61;
  border: none;
  border-radius: 8px;
  padding: 10px 20px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.3s, transform 0.2s;
}
button:hover {
  background-color: #ff3b2e;
  transform: translateY(-2px);
}

/* Контент и формы */
#authSection {
  display: flex;
  justify-content: center;
  margin-bottom: 20px;
}
#authForms {
  display: flex;
  flex-direction: column;
  align-items: center;
  max-width: 400px;
  margin: 0 auto;
}
#authForms > div {
  display: none;
  width: 100%;
  background: rgba(255,255,255,0.1);
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
}
#authForms > div.active {
  display: block;
}
#authForms input {
  width: 100%;
  margin: 8px 0;
  padding: 8px;
  border-radius: 6px;
  border: none;
  font-family: 'Roboto', sans-serif;
}
#content {
  max-width: 1024px;
  margin: 0 auto 40px auto;
}
#games {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
}
.game {
  background: rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 15px;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
  transition: transform 0.2s, box-shadow 0.2s;
}
.game:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}
.game img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 8px;
  margin-bottom: 10px;
}
#adminPanel {
  background: rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 20px;
  margin-top: 30px;
}
h4 {
  margin-top: 20px;
}
#gameListAdmin, #reviewsModeration {
  max-height: 250px;
  overflow-y: auto;
  margin-top: 10px;
  padding: 10px;
}
#gameListAdmin div, #reviewsModeration div {
  margin-bottom: 10px;
}
#addGameForm, #editGameForm {
  margin-top: 15px;
  padding: 15px;
  background: rgba(255,255,255,0.2);
  border-radius: 12px;
}
#addGameForm input[type=text], #addGameForm input[type=number], #editGameForm input[type=text], #editGameForm input[type=number] {
  width: calc(50% - 10px);
  margin: 8px 10px;
  padding: 8px;
  border-radius: 6px;
  border: none;
}
#saveGameBtn, #saveEditedBtn, #cancelEditBtn {
  width: 100%;
  padding: 10px;
  margin-top: 12px;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
}
#saveGameBtn { background: #4CAF50; color: #fff; }
#saveEditedBtn { background: #2196F3; color: #fff; }
#cancelEditBtn { background: #f44336; color: #fff; }
</style>
</head>
<body>

<h1>🎮 Мой расширенный игровой трекер</h1>

<!-- Кнопка для входа/регистрации -->
<div id="authSection">
  <button onclick="showAuth()">Войти / Регистрация</button>
</div>

<!-- Формы входа и регистрации -->
<div id="authForms" style="display:none;">
  <div id="loginForm">
    <h3>Войти</h3>
    <input type="email" id="loginEmail" placeholder="Email" />
    <input type="password" id="loginPassword" placeholder="Пароль" />
    <button onclick="performLogin()">Войти</button>
  </div>
  <div id="registerForm" style="display:none;">
    <h3>Регистрация</h3>
    <input type="text" id="registerNick" placeholder="Ник" />
    <input type="email" id="registerEmail" placeholder="Email" />
    <input type="password" id="registerPassword" placeholder="Пароль" />
    <button onclick="performRegister()">Зарегистрироваться</button>
  </div>
  <button onclick="hideAuth()">Отмена</button>
</div>

<!-- Основной контент после входа -->
<div id="content" style="display:none;">
  <p>Вы вошли как: <b id="userEmail"></b></p>
  <button onclick="logout()">Выйти</button>

  <!-- Админская панель -->
  <div id="adminPanel" style="display:none; background: rgba(255,255,255,0.1); border-radius:12px; padding:20px; margin-top:20px;">
    <h3 style="margin-bottom:15px;">👑 Админка</h3>
    <button onclick="showAddGame()">Добавить/Редактировать игру</button>
    <button onclick="loadAdminTools()">Обновить список</button>

    <!-- Форма добавления или редактирования -->
    <div id="addEditContainer" style="margin-top:15px; display:none;">
      <!-- Добавление -->
      <div id="addGameForm">
        <h4>Добавить новую игру</h4>
        <input type="text" id="newGameName" placeholder="Название" />
        <input type="number" id="newGameRating" placeholder="Рейтинг" min="1" max="10" />
        <select id="newGameStatus">
          <option>Пройдено</option>
          <option>В процессе</option>
          <option>В планах</option>
        </select>
        <input type="file" id="newGameImage" accept="image/*" />
        <button onclick="saveGame()">Сохранить игру</button>
      </div>
      <!-- Редактирование -->
      <form id="editGameForm" style="display:none; margin-top:15px; background:#333; padding:15px; border-radius:8px;">
        <input type="hidden" id="editGameId" />
        <h4>Редактировать игру</h4>
        <input type="text" id="editGameName" placeholder="Название" />
        <input type="number" id="editGameRating" placeholder="Рейтинг" min="1" max="10" />
        <select id="editGameStatus">
          <option>Пройдено</option>
          <option>В процессе</option>
          <option>В планах</option>
        </select>
        <input type="file" id="editGameImage" accept="image/*" />
        <button type="button" id="saveEditedBtn" onclick="saveEditedGame()">Обновить игру</button>
        <button type="button" id="cancelEditBtn" onclick="hideEditForm()">Отмена</button>
      </form>
    </div>

    <h4>Модерация отзывов</h4>
    <div id="reviewsModeration" style="max-height:200px; overflow:auto; background: rgba(255,255,255,0.1); padding:10px; border-radius:8px;"></div>
    <h4>Список игр на удаление/редактирование</h4>
    <div id="gameListAdmin"></div>
  </div>

  <h3>Все игры</h3>
  <div id="games"></div>

  <!-- Оставить отзыв -->
  <div style="margin-top:30px;">
    <h4>Оставить отзыв</h4>
    <select id="reviewGame"></select>
    <input type="number" id="reviewRating" placeholder="Оценка 1-10" min="1" max="10" />
    <select id="reviewBack">
      <option value="yes">Вернусь</option>
      <option value="no">Не вернусь</option>
      <option value="maybe">Возможно</option>
    </select>
    <button onclick="submitReview()">Отправить</button>
  </div>
</div>

<!-- Скрипты -->
<script>
  // Объявляем переменную Firebase auth
  const firebaseConfig = {
    apiKey: "AIzaSyCeQmPBVXyoJdfwZRoINJonFmPMmrBGH30",
    authDomain: "mygametracker-44a38.firebaseapp.com",
    projectId: "mygametracker-44a38",
    storageBucket: "mygametracker-44a38.appspot.com",
    messagingSenderId: "756062929019",
    appId: "1:756062929019:web:7c484a6d691f441a2fe2de",
    measurementId: "G-1JQYS1VV4L"
  };
  // Инициализация
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth(); // обязательно перед использованием

  const db = firebase.firestore();
  const storage = firebase.storage();

  const ADMIN_EMAIL = "werker196@gmail.com";

  let isAdmin = false;

  // Управление формами
  function showAuth() {
    document.getElementById('authSection').innerHTML='';
    document.getElementById('authForms').style.display='flex';
    document.getElementById('content').style.display='none';
    showLoginForm();
  }
  function hideAuth() {
    document.getElementById('authSection').innerHTML= '<button onclick="showAuth()">Войти / Регистрация</button>';
    document.getElementById('authForms').style.display='none';
  }
  function showLoginForm() {
    document.getElementById('loginForm').style.display='block';
    document.getElementById('registerForm').style.display='none';
  }
  function showRegisterForm() {
    document.getElementById('loginForm').style.display='none';
    document.getElementById('registerForm').style.display='block';
  }

  // Войти
  async function performLogin() {
    try {
      await auth.signInWithEmailAndPassword(
        document.getElementById('loginEmail').value.trim(),
        document.getElementById('loginPassword').value.trim()
      );
      hideAuth();
    } catch(e) { alert('Ошибка: ' + e.message); }
  }
  // Зарегистрироваться
  async function performRegister() {
    try {
      const userCred = await auth.createUserWithEmailAndPassword(
        document.getElementById('registerEmail').value.trim(),
        document.getElementById('registerPassword').value.trim()
      );
      await userCred.user.updateProfile({ displayName: document.getElementById('registerNick').value.trim() });
      localStorage.setItem('siteUser', JSON.stringify({email: userCred.user.email, nick: document.getElementById('registerNick').value.trim() }));
      alert('Регистрация прошла успешно! Войдите.');
      hideAuth();
    } catch(e){ alert('Ошибка: ' + e.message); }
  }

  // Обработчик изменений входа
  auth.onAuthStateChanged(user => {
    if (user) {
      document.getElementById('content').style.display='block';
      document.getElementById('userEmail').innerText=''+(user.displayName || user.email);
      // Проверка админа
      if (user.email===ADMIN_EMAIL) {
        isAdmin=true;
        loginAsAdmin();
      } else {
        isAdmin=false;
        loginAsUser(user.displayName || user.email);
      }
    } else {
      showAuth();
      document.getElementById('adminPanel').style.display='none';
    }
  });

  function logout() {
    auth.signOut();
    isAdmin=false;
  }

  function loginAsUser(nick) {
    document.getElementById('content').style.display='block';
    document.getElementById('userEmail').innerText='Вы вошли как: <b>' + (nick || 'пользователь') + '</b>';
  }
  function loginAsAdmin() {
    document.getElementById('content').style.display='block';
    document.getElementById('userEmail').innerText='Вы вошли как <b>Админ</b>';
    document.getElementById('adminPanel').style.display='block';
    loadAdminTools();
    loadGames();
  }

  // Загрузка игр
  async function loadGames() {
    const snap = await db.collection('games').get();
    document.getElementById('games').innerHTML='';
    document.getElementById('reviewGame').innerHTML='<option value="">Выберите игру</option>';
    snap.forEach(doc => {
      const g = {...doc.data(), id: doc.id};
      let img=g.imageUrl?`<img src="{g.imageUrl}"/>`:'';
      document.getElementById('games').innerHTML+=
        `<div class="game">${img}<h4>${g.name}</h4><p>⭐${g.rating}/10, ${g.status}</p></div>`;
      // для отзывов
      document.getElementById('reviewGame').innerHTML += `<option value="${g.id}">${g.name}</option>`;
    });
  }

  // В админ-панель
  async function loadAdminTools() {
    const user = await auth.currentUser;
    if (!user || user.email !== ADMIN_EMAIL) return;
    // отзывы
    const snap = await db.collection('reviews').where('status','==','pending').get();
    const revDiv=document.getElementById('reviewsModeration');
    revDiv.innerHTML='';
    if (snap.empty) {
      revDiv.innerHTML='Нет отзывов на модерации.';
    } else {
      snap.forEach(r => {
        const d=r.data();
        revDiv.innerHTML+=`<div>📝 ${d.userNick}: <b>${d.rate}</b>/10 (${d.back})</div>
        <button onclick="approveRev('${r.id}')">✓ Одобрить</button>
        <button onclick="rejectRev('${r.id}')">✗ Удалить</button><hr>`;
      });
    }
    // список игр
    const docs=await db.collection('games').get();
    const gameListDiv=document.getElementById('gameListAdmin');
    gameListDiv.innerHTML='';
    docs.forEach(g => {
      const data=g.data();
      gameListDiv.innerHTML+=`<div style="display:flex; justify-content:space-between; align-items:center;">
        <span>${data.name}</span>
        <div>
          <button onclick="editGame('${g.id}')">Редактировать</button>
          <button onclick="deleteGame('${g.id}')">Удалить</button>
        </div>
      </div>`;
    });
  }

  async function approveRev(id) {
    await db.collection('reviews').doc(id).update({status:'approved'});
    loadAdminTools();
  }
  async function rejectRev(id) {
    await db.collection('reviews').doc(id).delete();
    loadAdminTools();
  }

  async function deleteGame(id) {
    if (confirm('Удалить игру?')) {
      await db.collection('games').doc(id).delete();
      const revs=await db.collection('reviews').where('gameId','==',id).get();
      for (const r of revs.docs) await db.collection('reviews').doc(r.id).delete();
      loadGames();
      loadAdminTools();
    }
  }

  // Сохранить новую игру
  async function saveGame() {
    const name=document.getElementById('newGameName').value.trim();
    const rating=parseInt(document.getElementById('newGameRating').value);
    const status=document.getElementById('newGameStatus').value;
    const file=document.getElementById('newGameImage').files[0];

    if (!name || !rating) { alert('Заполните все поля!'); return; }

    let imageUrl='';
    if (file) {
      const ref=storage.ref().child('game_images/'+Date.now()+'.jpg');
      await ref.put(file);
      imageUrl=await ref.getDownloadURL();
    }
    await db.collection('games').add({name, rating, status, imageUrl});
    document.getElementById('newGameName').value='';
    document.getElementById('newGameRating').value='';
    loadGames();
    loadAdminTools();
  }

  // Редактировать игру
  async function editGame(id) {
    const g=await db.collection('games').doc(id).get();
    const data=g.data();
    document.getElementById('editGameId').value=id;
    document.getElementById('editGameName').value=data.name;
    document.getElementById('editGameRating').value=data.rating;
    document.getElementById('editGameStatus').value=data.status;
    document.getElementById('editGameForm').style.display='block';
  }

  function showAddGame() {
    document.getElementById('editGameForm').style.display='block';
    document.getElementById('editGameId').value='';
    document.getElementById('editGameName').value='';
    document.getElementById('editGameRating').value='';
    document.getElementById('editGameStatus').value='Пройдено';
  }

  function hideEditForm() {
    document.getElementById('editGameForm').style.display='none';
  }
  // Сохранить редактирование
  async function saveEditedGame() {
    const id=document.getElementById('editGameId').value;
    const name=document.getElementById('editGameName').value.trim();
    const rating=parseInt(document.getElementById('editGameRating').value);
    const status=document.getElementById('editGameStatus').value;
    const file=document.getElementById('editGameImage').files[0];

    if (!name || !rating) { alert('Заполните все поля!'); return; }

    const updateData={name,rating,status};
    if (file) {
      const ref=storage.ref().child('game_images/'+Date.now()+'.jpg');
      await ref.put(file);
      updateData.imageUrl=await ref.getDownloadURL();
    }

    await db.collection('games').doc(id).update(updateData);
    hideEditForm();
    loadGames();
    loadAdminTools();
  }

  // Отзыв
  async function submitReview() {
    const gameId=document.getElementById('reviewGame').value;
    const rate=document.getElementById('reviewRating').value;
    const back=document.getElementById('reviewBack').value;
    const user=JSON.parse(localStorage.getItem('siteUser'));
    if (!gameId || !rate || !user) { alert('Заполните всё!'); return; }
    await db.collection('reviews').add({
      gameId, rate, back, userNick: user.nick || user.email, status:'pending', created:new Date()
    });
    alert('Отзыв отправлен на модерацию!');
    document.getElementById('reviewRating').value='';
    document.getElementById('reviewGame').value='';
  }

  // Показываем форму редактирования
  function showEditGame(id) {
    editGame(id);
  }
</script>
</body>
</html>
